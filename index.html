<!DOCTYPE html>
<html>
<head>
    <title>Root Web ADB Toggle</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f2f5; }
        button { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; border-radius: 8px; border: none; background: #007bff; color: white; transition: 0.3s; }
        button:disabled { background: #ccc; }
        .status { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Root APM Control</h1>
    <button id="connectBtn">Connect Device</button>
    <div style="margin-top: 20px;">
        <button id="onBtn" disabled>Turn ON Airplane Mode</button>
        <button id="offBtn" disabled>Turn OFF Airplane Mode</button>
    </div>
    <p class="status" id="status">Status: Disconnected</p>

    <script type="module">
        import { AdbWebUsbBackend, Adb } from 'https://cdn.jsdelivr.net/npm/@yume-chan/adb@latest/dist/index.js';

        let adb;
        let device;

        const connectBtn = document.getElementById('connectBtn');
        const statusText = document.getElementById('status');

        connectBtn.onclick = async () => {
            try {
                const backend = await AdbWebUsbBackend.requestDevice();
                adb = new Adb(backend);
                statusText.innerText = "Status: Connected! Check phone for RSA prompt.";
                
                // Enable buttons
                document.getElementById('onBtn').disabled = false;
                document.getElementById('offBtn').disabled = false;
            } catch (e) {
                statusText.innerText = "Error: " + e.message;
            }
        };

        async function runRootCommand(cmd) {
            // This sends the command to the shell as a root user
            const shell = await adb.subprocess.shell(`su -c "${cmd}"`);
            await shell.onClose;
        }

        document.getElementById('onBtn').onclick = () => {
            const cmd = "settings put global airplane_mode_on 1 && am broadcast -a android.intent.action.AIRPLANE_MODE --ez state true";
            runRootCommand(cmd);
            statusText.innerText = "Status: Sent ON command";
        };

        document.getElementById('offBtn').onclick = () => {
            const cmd = "settings put global airplane_mode_on 0 && am broadcast -a android.intent.action.AIRPLANE_MODE --ez state false";
            runRootCommand(cmd);
            statusText.innerText = "Status: Sent OFF command";
        };
    </script>
</body>
</html>
